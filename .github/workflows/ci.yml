name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: health_one
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: health_one_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PLATFORM_DB_URL: postgresql+asyncpg://health_one:ci_password@localhost:5432/health_one_platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Platform DB migrations
        run: cd health_one/platform && alembic upgrade head
      - name: Run Store DB migrations
        run: cd health_one/store && alembic upgrade head
      - name: Run tests
        run: pytest tests/ -v --cov=health_one --cov-report=term-missing --cov-fail-under=70
